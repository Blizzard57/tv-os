# TV OS player look — ModernZ (modern, minimal mpv player UI), themed to
# match the shell: dark slate, #4F8CFF accent, soft off-white text.
#
# EDIT THIS LIVE at  ~/.local/share/tvos/mpv/script-opts/modernz.conf
# Changes apply on the next playback — no rebuild. Delete it to restore these
# defaults. Full reference: https://github.com/Samillion/ModernZ
#
# This repo copy (tvosd/player/script-opts/modernz.conf) is what new installs
# ship with.

# ---- Layout: clean outline icons, big 10-foot sizing ----
layout=default
icon_theme=fluent
icon_style=outline
# Inter (bundled in fonts/, OFL) — the same typeface as the shell, so the
# player's title and times look like the rest of the system.
font=Inter
scalewindowed=1.0
scalefullscreen=1.3
title_font_size=28
time_font_size=18
chapter_title_font_size=16

# Title on top; no mpv idle logo; no window min/max/close chrome on a TV.
show_title=yes
title=${media-title}
window_top_bar=no
window_controls=no
idlescreen=no

# ---- Minimal control bar: only what a couch needs ----
# Keep: play/pause, jump ±10s, subtitles, audio tracks, speed, Enhance.
jump_buttons=yes
jump_amount=10
subtitles_button=yes
audio_tracks_button=yes
speed_button=yes
# The on-screen Enhance (upscaler) button: click opens the upscaler menu,
# right-click A/Bs against the original. Same menu as controller Y / key U.
enhance_button=yes
# Drop desktop-oriented chrome.
playlist_button=no
track_nextprev_buttons=no
fullscreen_button=no
info_button=no
ontop_button=no
screenshot_button=no
download_button=no
loop_button=no

# ---- Palette (mirrors shell/src/styles.css) ----
# bg #0B0A12 · surface #17151F · text #F4F3F8 · dim #928FA6 · accent #8B5CF6
osc_color=#0B0A12
title_color=#F4F3F8
time_color=#F4F3F8
chapter_title_color=#928FA6
playpause_color=#F4F3F8
side_buttons_color=#F4F3F8
middle_buttons_color=#F4F3F8
held_element_color=#928FA6
hover_effect_color=#8B5CF6

seekbarfg_color=#8B5CF6
seekbarbg_color=#3B3650
seekbar_cache_color=#928FA6
seek_handle_color=#F4F3F8
seek_handle_border_color=#8B5CF6
nibble_color=#8B5CF6
nibble_current_color=#FFFFFF
seekbar_height=medium
slider_rounded_corners=yes

# Thumbnail preview box styled like a shell card.
thumbnail_box_color=#0B0A12
thumbnail_box_outline=#3B3650
thumbnail_box_radius=14

# ---- Behaviour: stay up while paused, show on seek/start, then get out
#      of the way; reappear on any input. ----
showonpause=yes
keeponpause=both
osc_on_start=both
osc_on_seek=yes
hidetimeout=2000
fadeduration=200
visibility=auto
persistent_progress=no
