# TV OS player look — uosc.
#
# EDIT THIS LIVE: the installed copy is at
#   ~/.local/share/tvos/mpv/script-opts/uosc.conf
# Changes there apply on the next playback — no rebuild. Delete the file to
# restore these defaults. (This repo copy is what new installs/upgrades ship.)
#
# Full option reference:
# https://github.com/tomasklaen/uosc/blob/main/script-opts/uosc.conf

# --- Controls bar: minimal essentials only, with our Enhance (upscaler) button.
# `space` pushes items apart; `gap` is a small gap. auto_awesome = the ✦ icon.
controls=menu,gap,subtitles,<has_many_audio>audio,space,command:auto_awesome:script-binding upscaler/tvos-upscaler-menu?Enhance,space,fullscreen
controls_size=52
controls_margin=16
controls_spacing=12

# --- Timeline: a clean thin line that thickens on focus.
timeline_style=line
timeline_line_width=3
timeline_size=46

# --- A subtle always-on progress hint when the UI is hidden.
progress=fullscreen
progress_size=2
progress_line_width=2

# --- Top bar: just the title, only in fullscreen, no window buttons.
top_bar=fullscreen
top_bar_size=50
top_bar_controls=no
top_bar_title=yes

# --- Hide the persistent volume slider; volume still flashes when changed.
volume=none

# --- Sizing + softening for a 10-foot screen.
font_scale=115
menu_item_height=58
menu_min_width=440
border_radius=4
