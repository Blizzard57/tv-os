# TV OS player key map. Reinstalled by tvosd on every launch from
# tvosd/player/input.conf — edit it there.
#
# Works with a keyboard, a TV remote (HDMI-CEC maps D-pad/OK/Back to arrows/
# ENTER/ESC), and a game controller (scripts/controller.lua turns gamepad
# buttons into these same keys). The bundled tvos_player overlay grabs the
# arrows / ENTER / ESC for navigation and falls back to these bindings only
# where it does not need custom focus behavior.

# --- Playback ---
ENTER        cycle pause
SPACE        cycle pause
RIGHT        seek  10
LEFT         seek -10
Shift+RIGHT  seek  60
Shift+LEFT   seek -60
UP           add volume 5
DOWN         add volume -5
PGUP         add chapter 1
PGDWN        add chapter -1

# --- Leave the player (back to the shell) ---
ESC          quit
q            quit

# --- Tracks ---
c            cycle sub
v            cycle audio
j            cycle sub-visibility

# --- Enhance / upscaling ---
e            script-binding upscaler/tvos-enhance-toggle   # quick A/B on/off
u            script-binding upscaler/tvos-upscaler-menu    # pick an upscaler
n            script-binding upscaler/tvos-upscaler-next     # cycle upscalers

# --- Player UI ---
TAB          script-binding tvos_player/tvos-player-toggle
m            script-binding tvos_player/tvos-player-show
